name: Deploy / Web

on:
  push:
    branches:
      - master
    paths:
      - "server_manager/**"
      - "infrastructure/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy_web.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-deploy
  cancel-in-progress: false

env:
  GCP_REGION: asia-northeast1
  IMAGE_NAME: asia-northeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/outline-manager/outline-manager

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate install scripts
        run: npm run action server_manager/www/build_install_script

      - name: Build browser web app
        run: ./node_modules/.bin/webpack --config=server_manager/browser.webpack.js --mode=production

      - name: Prepare Docker build context
        run: |
          mkdir -p deploy
          cp -r output/build/server_manager/www/static/ deploy/static/

      - uses: google-github-actions/auth@v3
        with:
          service_account: ${{ vars.GCP_SA_EMAIL }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: deploy
          platforms: linux/amd64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: outline-manager
          image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          region: ${{ env.GCP_REGION }}
          flags: --service-account=outline-manager@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com
